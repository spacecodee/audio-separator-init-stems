version: "3.9"

services:
  stem-separator:
    build:
      context: .
      dockerfile: Dockerfile
    image: stem-separator:latest
    container_name: stem-separator
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./main.py:/app/main.py
      - ./input:/app/input        # Sube aquí los archivos de audio
      - ./output:/app/output      # Los stems separados se guardan aquí
      - ./models:/root/.cache/audio-separator  # Cache de modelos (evita re-descargas)
    ports:
      - "8000:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - LOG_LEVEL=info
    networks:
      - stem-net

networks:
  stem-net:
    driver: bridge
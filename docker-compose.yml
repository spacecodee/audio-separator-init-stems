services:
  stem-separator:
    build:
      context: .
      dockerfile: Dockerfile
    image: stem-separator:latest
    container_name: stem-separator
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./main.py:/app/main.py
      - ./input:/app/input
      - ./output:/app/output
      - ./models:/root/.cache/audio-separator
    ports:
      - "8000:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - LOG_LEVEL=info
    networks:
      - stem-net

networks:
  stem-net:
    driver: bridge